name: Weekly Oncology Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd pipeline
          pip install -r carcinos_ingestion/requirements.txt

      - name: Run ingestion pipeline (all 10 sites)
        env:
          CARCINOS_NCBI_EMAIL: ${{ secrets.CARCINOS_NCBI_EMAIL }}
          CARCINOS_NCBI_API_KEY: ${{ secrets.CARCINOS_NCBI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd pipeline
          python -m carcinos_ingestion.run --all --persist
